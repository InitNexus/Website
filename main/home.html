<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>
<link rel="icon" href="https://initnexus.github.io/Website/assets/media/branding/favicon.ico">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
background:#11111b;
color:#ffffff;
font-family:Arial,Helvetica,sans-serif;
min-height:100vh;
}

.navbar{
position:sticky;
top:0;
left:0;
width:100%;
height:60px;
background:rgba(39,39,54,0.6);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
border-bottom:1px solid #b9c0d9;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
}

.nav-title{
font-weight:bold;
color:#ffffff;
}

.nav-icons{
display:flex;
align-items:center;
gap:28px;
}

.nav-icons img{
width:22px;
height:22px;
cursor:pointer;
}

.nav-icons img:hover{
opacity:0.7;
}

@media(max-width:600px){

.nav-title{
display:none;
}

.nav-icons{
width:100%;
justify-content:space-evenly;
gap:0;
}

}
</style>
</head>
<body>

<nav class="navbar">

<div class="nav-title">
NexusByte
</div>

<div class="nav-icons">
<img src="https://initnexus.github.io/Website/assets/media/icons/home.png" onclick="window.location.href='https://initnexus.github.io/Website/main/home.html'">
<img src="https://initnexus.github.io/Website/assets/media/icons/search.png" onclick="window.location.href='https://initnexus.github.io/Website/developer/incomplete-page.html'">
<img src="https://initnexus.github.io/Website/assets/media/icons/menu.png">
</div>

</nav>

</body>
</html>
