<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome!</title>
<link rel="icon" href="https://initnexus.github.io/Website/assets/media/branding/logo.png" type="image/png">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    background: #11111B;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    text-align: center;
    color: #FFFFFF;
  }
  .spinner {
    width: 80px;
    height: 80px;
    margin-bottom: 20px;
    animation: spin 1s linear infinite;
  }
  .spinner circle {
    fill: none;
    stroke: #635A7A;
    stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 125.6;
    stroke-dashoffset: 94.2;
    transform-origin: 50% 50%;
  }
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  h1 {
    font-size: 1.8rem;
    color: #635A7A;
    margin-bottom: 10px;
  }
  p {
    font-size: 1rem;
    color: #FFFFFF;
  }
  @media (max-width: 480px) {
    .spinner {
      width: 60px;
      height: 60px;
    }
    h1 {
      font-size: 1.4rem;
    }
    p {
      font-size: 0.9rem;
    }
  }
</style>
</head>
<body>
  <svg class="spinner" viewBox="0 0 50 50">
    <circle cx="25" cy="25" r="20"></circle>
  </svg>
  <h1>Checking browser</h1>
  <p>Please wait while we verify that you're human...</p>

<script>
  setTimeout(() => {
    window.location.href = "https://initnexus.github.io/Website/main/home.html";
  }, 3000);
</script>
</body>
</html>
