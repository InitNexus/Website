<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome!</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    -webkit-tap-highlight-color:transparent
}
body{
    width:100%;
    height:100vh;
    background:#11111b;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:system-ui,Segoe UI,Roboto,sans-serif;
    color:#ffffff
}
.preloader{
    width:98%;
    max-width:500px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center
}
.spinner{
    width:70px;
    height:70px;
    margin-bottom:16px
}
h3{
    color:#c4a7e7;
    font-weight:600;
    margin-bottom:4px
}
.subtext{
    font-size:14px;
    opacity:.85
}
.footer{
    position:fixed;
    bottom:20px;
    width:98%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:6px;
    font-size:14px
}
.footer a{
    color:#c4a7e7;
    text-decoration:none
}
.footer a:hover{
    text-decoration:underline
}
@media(max-width:600px){
    h3{font-size:18px}
    .subtext{font-size:13px}
}
</style>
</head>

<body>

<div class="preloader">
    <svg class="spinner" viewBox="0 0 50 50">
        <circle cx="25" cy="25" r="20" fill="none" stroke="#c4a7e7" stroke-width="4" stroke-linecap="round" stroke-dasharray="90" stroke-dashoffset="60">
            <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s" repeatCount="indefinite"/>
        </circle>
    </svg>

    <h3>Welcome to NexusByte</h3>
    <div class="subtext">Please wait a moment...</div>
</div>

<div class="footer">
    <span>Secured by</span>
    <a href="#">NexusByte Initiative</a>
</div>

<script>
setTimeout(()=>{window.location.href="https://InitNexus.github.io/Website/main/landing-page.html"},3000)
</script>

</body>
</html>
