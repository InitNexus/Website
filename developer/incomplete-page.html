<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incomplete Page</title>
<link rel="icon" href="https://initnexus.github.io/Website/assets/media/branding/favicon.ico">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
background:#11111b;
color:#ffffff;
font-family:Arial,Helvetica,sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
width:98%;
margin:auto;
}

.main-body{
background:#181825;
width:98%;
max-width:420px;
border-radius:10px;
border:1px solid #b9c0d9;
padding:30px 20px;
display:flex;
flex-direction:column;
align-items:center;
}

.icon{
width:42px;
height:42px;
margin-bottom:25px;
}

h3{
width:100%;
text-align:center;
margin-bottom:10px;
color:#ffffff;
}

p{
width:100%;
text-align:center;
margin-bottom:25px;
color:#ffffff;
}

.buttons{
width:100%;
display:flex;
flex-direction:column;
gap:12px;
}

button{
width:100%;
background:#8c92aa;
border:1px solid #b9c0d9;
border-radius:10px;
padding:12px;
font-size:15px;
cursor:pointer;
color:#11111b;
}

button:hover{
background:#313244;
color:#ffffff;
}

@media(max-width:600px){
.main-body{
padding:25px 18px;
}
.icon{
width:40px;
height:40px;
}
}
</style>
</head>
<body>

<div class="main-body">

<img class="icon" src="https://initnexus.github.io/Website/assets/media/icons/information.png">

<h3>Incomplete Page</h3>

<p>This page isn't finished yet, please come back soon!</p>

<div class="buttons">
<button onclick="window.location.href='https://initnexus.github.io/Website/main/home.html'">Go to home</button>
<button onclick="window.location.href='https://github.com/initnexus/Website'">GitHub repository</button>
</div>

</div>

</body>
</html>
