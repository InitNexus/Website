<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incomplete Page</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
}
html, body {
    background: #11111b;
    font-family: system-ui, Segoe UI, Roboto, sans-serif;
    color: #ffffff;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}
.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    text-align: center;
}
.container img {
    width: 80px;
    height: 80px;
}
.container h3 {
    color: #c4a7e7;
}
.container p {
    opacity: 0.85;
}
.container a {
    margin-top: 16px;
    padding: 10px 24px;
    border-radius: 8px;
    background: #c4a7e7;
    color: #ffffff;
    display: inline-block;
    text-align: center;
    text-decoration: none;
    transition: background 0.2s ease;
}
.container a:hover {
    background: #8a77a6;
}
@media (max-width: 600px) {
    .container img {
        width: 60px;
        height: 60px;
    }
}
</style>
</head>
<body>
<div class="container">
    <img src="#" alt="">
    <h3>Incomplete page</h3>
    <p>This page is incomplete, please come back soon.</p>
    <a href="https://InitNexus.github.io/Website/main/landing-page.html">Go to home</a>
</div>
</body>
</html>
