<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colour Palette</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
    outline:none;
    user-select:none;
}
html,body{
    margin:0;
    padding:0;
    width:100%;
    min-height:100%;
    background:#0b0b0f;
    font-family:Arial,Helvetica,sans-serif;
}
.page{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:48px 16px;
}
.body{
    width:98%;
    max-width:1200px;
    background:rgba(20,20,30,0.55);
    backdrop-filter:blur(12px);
    border-radius:8px;
    padding:24px;
    display:flex;
    flex-direction:column;
    gap:12px;
    border:1px solid rgba(255,255,255,0.15);
}
.bar{
    width:100%;
    min-height:48px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 16px;
    border-radius:8px;
    border:1px solid rgba(255,255,255,0.25);
}
.hex{
    color:#ff0000;
    font-weight:bold;
    letter-spacing:1px;
}
.copy{
    background:transparent;
    border:2px solid #ff0000;
    color:#ff0000;
    padding:6px 14px;
    border-radius:8px;
    cursor:pointer;
}
.copy:active{
    transform:scale(0.95);
}
@media(max-width:600px){
    .bar{
        flex-direction:column;
        align-items:flex-start;
        gap:8px;
    }
    .copy{
        width:100%;
        text-align:center;
    }
}
</style>
</head>
<body>
<div class="page">
    <div class="body" id="palette"></div>
</div>

<script>
const anchors=[
    "#11111B",
    "#181825",
    "#1E1E2E",
    "#313244",
    "#2E3040",
    "#C4A7E7",
    "#7F859B",
    "#B49AD5"
];

function hexToRgb(h){
    return{
        r:parseInt(h.slice(1,3),16),
        g:parseInt(h.slice(3,5),16),
        b:parseInt(h.slice(5,7),16)
    };
}
function rgbToHex(r,g,b){
    return"#"+[r,g,b].map(v=>v.toString(16).padStart(2,"0")).join("").toUpperCase();
}
function interpolate(a,b,t){
    return{
        r:Math.round(a.r+(b.r-a.r)*t),
        g:Math.round(a.g+(b.g-a.g)*t),
        b:Math.round(a.b+(b.b-a.b)*t)
    };
}

const palette=document.getElementById("palette");
const steps=40;

for(let i=0;i<anchors.length-1;i++){
    const c1=hexToRgb(anchors[i]);
    const c2=hexToRgb(anchors[i+1]);
    for(let s=0;s<=steps;s++){
        const t=s/steps;
        const c=interpolate(c1,c2,t);
        const hex=rgbToHex(c.r,c.g,c.b);
        const bar=document.createElement("div");
        bar.className="bar";
        bar.style.background=hex;
        const label=document.createElement("div");
        label.className="hex";
        label.textContent=hex;
        const btn=document.createElement("button");
        btn.className="copy";
        btn.textContent="Copy";
        btn.onclick=()=>navigator.clipboard.writeText(hex);
        bar.appendChild(label);
        bar.appendChild(btn);
        palette.appendChild(bar);
    }
}
</script>
</body>
</html>
